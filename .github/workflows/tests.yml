name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --group dev

      - run: uv run ruff check src/ tests/

      - run: uv run playwright install --with-deps chromium

      - run: uv run pytest tests/
