<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bayesian Quiz{% endblock %}</title>
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', system-ui, sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        code { font-family: 'JetBrains Mono', monospace; background: #e0e7ff; color: #3730a3; padding: 0.1em 0.35em; border-radius: 0.25em; font-size: 0.9em; }
        code + code { margin-left: 0.3em; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <div id="sse" hidden></div>
    {% block body %}{% endblock %}
    {% block scripts %}{% endblock %}
    {% if slug is defined and slug %}
    <script>
    (function() {
        var sse = document.getElementById('sse');
        var source = new EventSource('/events?' + {{ slug | tojson }});
        window._quizSSE = source;
        ['phase_changed', 'participant_joined', 'estimate_submitted', 'connected'].forEach(function(evt) {
            source.addEventListener(evt, function() {
                sse.dispatchEvent(new CustomEvent(evt, {bubbles: true}));
            });
        });
    })();
    </script>
    {% endif %}
</body>
</html>
