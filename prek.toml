[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-merge-conflict" },
  { id = "check-added-large-files" },
  { id = "detect-private-key" },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.9"
hooks = [
  { id = "ruff-check" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "pytest", name = "pytest", entry = "uv run pytest -q", language = "system", types = ["python"], pass_filenames = false },
]
